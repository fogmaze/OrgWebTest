<!-- course list -->
<div class="row justify-content-center">
  {% if data.course and data.course.length %}
    {% for item in data.course %}
      {% if item.Title or item.Img %}
      <div class="col-lg-4 col-sm-6 mb-5">
        <div class="card p-0 border-primary rounded-0 hover-shadow">
          <img class="card-img-top rounded-0" src="{{ item.Img | replace('\\\\', '/') }}" alt="course thumb">
          <div class="card-body">
            <a href="#contact">
              <h4 class="card-title">{{ item.Title }}</h4>
            </a>
          </div>
        </div>
      </div>
      {% endif %}
    {% endfor %}
  {% else %}
    <div class="col-12">
      <p class="text-center mb-0">目前沒有可顯示的課程</p>
    </div>
  {% endif %}
</div>
<!-- /course list -->
